name: iOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Build and run unit tests
    runs-on: macos-latest

    env:
      SCHEME: TutastartTests
      PROJECT: Tutastart.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Pick iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | jq -r '.devices | to_entries[] | select(.key | contains("iOS")) | .value[] | select(.name | startswith("iPhone")) | .udid' \
            | head -1)
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available. Listing what's installed:"
            xcrun simctl list devices available
            exit 1
          fi
          NAME=$(xcrun simctl list devices available -j \
            | jq -r --arg u "$UDID" '.devices | to_entries[] | .value[] | select(.udid == $u) | .name')
          echo "Using simulator: $NAME ($UDID)"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO

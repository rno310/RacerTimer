name: Tutastart
options:
  bundleIdPrefix: com.arnaud.tutastart
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM: ABCD123456   # set this to your 10-char Team ID so xcodegen keeps it
    ENABLE_PREVIEWS: YES
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Tutastart:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arnaud.tutastart
        PRODUCT_NAME: Tutastart
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "Pin to Win"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: "Tutastart Watch App"
        embed: true

  "Tutastart Watch App":
    type: application
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arnaud.tutastart.watchkitapp
        PRODUCT_NAME: Tutastart
        ASSETCATALOG_COMPILER_APPICON_NAME: WatchAppIcon
        INFOPLIST_FILE: Watch/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"

  TutastartTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arnaud.tutastart.tests
        GENERATE_INFOPLIST_FILE: YES
